version: "3.9"

services:
  database: #ESSE É O NOME DO SERVICE QUE DEVE ESTAR NO ARQUIVO DE CRIAÇÃO DE CONEXÃO
    image: postgres
    container_name: database_stock
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=docker123
      - POSTGRES_DB=stock
    volumes:
      - pgdata:/data/postgres

  redisstock:
    image: redis:alpine
    container_name: redisstock
    restart: always
    ports:
      - "6378:6379"

  app:
    build: .
    container_name: stock
    restart: always
    ports:
      - 4444:4444
      - 9229:9229 #Você pode inserir essa porta tbm pra poder usar o debug
    volumes:
      - .:/usr/app
    links:
      - database
      - redisstock
    depends_on:
      - database
      - redisstock



volumes:
  pgdata:
    driver: local
